name: FluidSync Daemon CI

on:
  push:
    branches: [ main, master ]
    tags: [ "v*" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install DMD + dub
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: dmd-latest

      - name: Build
        run: dub build --build=release

